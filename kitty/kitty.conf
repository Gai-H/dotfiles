# fonts
font_family      family="FiraCode Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
disable_ligatures always
font_size 15.5
modify_font underline_position 3

# keymaps
clear_all_shortcuts yes
map cmd+c copy_and_clear_or_interrupt
map cmd+v paste_from_clipboard
map cmd+n new_os_window
map cmd+tab next_tab
map cmd+shift+tab previous_tab
map cmd+t new_tab
map cmd+w close_tab
map cmd+semicolon change_font_size all +2.0
map cmd+minus change_font_size all -2.0
map cmd+m minimize_macos_window
map cmd+q quit
enable_mouse_reporting no

# cursor
cursor_trail 2

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
